<script>
    let selectElem = document.querySelector('#menu');
    let pageContent = document.querySelector('body');

        if (current == 'home') {
            alert('Welcome to Coolpicks!');
        } else if (current == 'places') {
            alert('Explore our collection of stunning places!');
