<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recipe Book</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="index.css">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="Browse delicious homemade recipes.">
    <meta property="og:url" content="https://yourwebsite.com">
    <meta property="og:image" content="social-preview-image.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Recipe Book">
    <meta name="twitter:description" content="Browse delicious homemade recipes.">
    <meta name="twitter:image" content="social-preview-image.png">

    <link rel="icon" href="favicon.ico">

</head>
<body>

<header>

    <div class="logo">
        <img src="recipe-book.png" alt="Recipe Book Logo">
        <h1>RecipeBook</h1>
    </div>

</header>

<main>

    <div class="search">

        <input type="text" placeholder="Find a recipe">

        <button>
            <img src="search.svg" alt="Search">
        </button>

    </div>

    <article class="recipe">

        <img class="recipe-image"
            src="apple-crisp.jpg"
            alt="Apple Crisp">

        <div class="recipe-info">

            <p class="category">dessert</p>

            <h2>APPLE CRISP</h2>

            <span
                class="rating"
                role="img"
                aria-label="Rating: 4 out of 5 stars"
            >
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">⭐</span>
                <span aria-hidden="true">☆</span>
            </span>

            <p class="description">
                This apple crisp recipe is a simple yet delicious fall
                dessert that's great served warm with vanilla ice cream.
            </p>

        </div>

    </article>

</main>

<footer>

    <a href="https://www.flaticon.com/free-icons/recipe"
       title="recipe icons">
       Recipe icons created by Freepik - Flaticon
    </a>

    <div class="social">


        <a href="#"><img src="instagram_icon.svg" alt="Instagram"></a>
        <a href="#"><img src="youtube_icon.svg" alt="YouTube"></a>
        <a href="#"><img src="pinterest_icon.svg" alt="Pinterest"></a>

    </div>

</footer>

</body>
</html>
